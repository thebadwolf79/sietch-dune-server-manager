version: 2
updates:
  # Frontend npm dependencies (Vite, React, Radix, Tauri JS, etc.)
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk patch/minor bumps into one PR to cut noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust workspace crates (tauri, tokio, axum, rusqlite, …)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # The GitHub Actions used by ci.yml / release.yml (would have caught the
  # Node 20 -> Node 24 deprecation automatically).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
