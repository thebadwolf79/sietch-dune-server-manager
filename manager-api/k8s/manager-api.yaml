# Create the auth Secret before applying this manifest:
# kubectl -n <battlegroup-namespace> create secret generic dune-manager-api-auth --from-literal=token=<generated-token>
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dune-manager-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dune-manager-api
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["igw.funcom.com"]
    resources: ["battlegroups"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["igw.funcom.com"]
    resources:
      - battlegroupdirectors
      - battlegroupstats
      - databases
      - databasedeployments
      - filebrowsers
      - messagequeues
      - servergateways
      - servergroups
      - serversets
      - serverstats
      - textrouters
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dune-manager-api
subjects:
  - kind: ServiceAccount
    name: dune-manager-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dune-manager-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dune-manager-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dune-manager-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dune-manager-api
    spec:
      serviceAccountName: dune-manager-api
      containers:
        - name: api
          image: dune-manager-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MANAGER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dune-manager-api-auth
                  key: token
            - name: DIRECTOR_BASE_URL
              value: ""
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dune-manager-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dune-manager-api
  ports:
    - name: http
      port: 8787
      targetPort: http
